<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artworks</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
</head>

<body>
    <main>
        <p id="see-all-txt">See All</p>
        <h1 id="explore-txt">Explore Art Work</h1>
        <div class="container">
            <div class="artwork">
                <div class="artwork-img">
                    <img src="./assets/Ancient Deity.jpg" alt="Art Work Image">
                </div>

                <div class="artwork-details">
                    <p class="artwork-name">Monocular</p>
                    <div class="artwork-like-section">
                        <p class="like-count">54.8k</p>
                        <i class="ri-heart-line"></i>
                    </div>
                </div>
                <button class="place-bid-btn">Place Bid</button>
            </div>

            <div class="artwork">
                <div class="artwork-img">
                    <img src="./assets/horns mask.jpg" alt="Art Work Image">
                </div>

                <div class="artwork-details">
                    <p class="artwork-name">Horns Mask</p>
                    <div class="artwork-like-section">
                        <p class="like-count">32.4k</p>
                        <i class="ri-heart-line"></i>
                    </div>
                </div>
                <button class="place-bid-btn">Place Bid</button>
            </div>

            <div class="artwork">
                <div class="artwork-img">
                    <img src="./assets/Light Moon.jpg" alt="Art Work Image">
                </div>

                <div class="artwork-details">
                    <p class="artwork-name">Light Moon</p>
                    <div class="artwork-like-section">
                        <p class="like-count">66.6k</p>
                        <i class="ri-heart-line"></i>
                    </div>
                </div>
                <button class="place-bid-btn">Place Bid</button>
            </div>

            <div class="artwork">
                <div class="artwork-img">
                    <img src="./assets/skull wire.jpg" alt="Art Work Image">
                </div>

                <div class="artwork-details">
                    <p class="artwork-name">Skull Wire</p>
                    <div class="artwork-like-section">
                        <p class="like-count">74.8k</p>
                        <i class="ri-heart-line"></i>
                    </div>
                </div>
                <button class="place-bid-btn">Place Bid</button>
            </div>

            <div class="artwork">
                <div class="artwork-img">
                    <img src="./assets/spiderman.jpg" alt="Art Work Image">
                </div>

                <div class="artwork-details">
                    <p class="artwork-name">Spiderman</p>
                    <div class="artwork-like-section">
                        <p class="like-count">200.3k</p>
                        <i class="ri-heart-line"></i>
                    </div>
                </div>
                <button class="place-bid-btn">Place Bid</button>
            </div>


            <div class="artwork">
                <div class="artwork-img">
                    <img src="./assets/deadpool.jpg" alt="Art Work Image">
                </div>

                <div class="artwork-details">
                    <p class="artwork-name">Deadpool</p>
                    <div class="artwork-like-section">
                        <p class="like-count">154.8k</p>
                        <i class="ri-heart-line"></i>
                    </div>
                </div>
                <button class="place-bid-btn">Place Bid</button>
            </div>


            <div class="artwork">
                <div class="artwork-img">
                    <img src="./assets/dark eye.jpg" alt="Art Work Image">
                </div>

                <div class="artwork-details">
                    <p class="artwork-name">Dark Eye</p>
                    <div class="artwork-like-section">
                        <p class="like-count">45.7k</p>
                        <i class="ri-heart-line"></i>
                    </div>
                </div>
                <button class="place-bid-btn">Place Bid</button>
            </div>


            <div class="artwork">
                <div class="artwork-img">
                    <img src="./assets/plastic spine.jpeg" alt="Art Work Image">
                </div>

                <div class="artwork-details">
                    <p class="artwork-name">Plastic Spine</p>
                    <div class="artwork-like-section">
                        <p class="like-count">95.6k</p>
                        <i class="ri-heart-line"></i>
                    </div>
                </div>
                <button class="place-bid-btn">Place Bid</button>
            </div>
        </div>
        <div class="dots-container">
            <div class="dots"></div>
            <div class="dots"></div>
            <div class="dots"></div>
            <div class="dots"></div>
            <div class="dots"></div>
            <div class="dots"></div>
        </div>

    </main>
</body>

</html>
