<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <meta name="description" content="Information of Pokemons"/>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
</head>

<body>
    <main>
        <div class="container">
            <nav>
                <img id="logo" src="./assets/logo.png" alt="Pokemon logo">
                <i class="ri-menu-fill"></i>
            </nav>
            <div class="card">
                <div class="pokemon-details">
                    <p id="pokemon-gen">Pokemon gen i</p>
                    <h1 id="pokemon-name">Pikachu</h1>
                    <p id="pokemon-description">Pikachu is an Electric-type Pokémon introduced in Generation I.
                        Pikachu are small, chubby, and incredibly cute mouse-like Pokémon. They are almost
                        completely covered by yellow fur.
                    </p>
                    <div class="number-texts">
                        <hr>
                        <p id="pokemon-no">01 / 08</p>
                    </div>
                </div>
                <img id="pokemon-img" src="./assets/pikachu_body.png" alt="Pokemon Image">
                <div class="button-container">
                    <div id="black-btn" class="button"></div>
                    <div class="button"></div>
                    <div class="button"></div>
                    <div class="button"></div>
                    <div class="button"></div>
                </div>
            </div>
        </div>
        <img id="pokemon-ball" src="./assets/pokemon-ball.svg" alt="Pokeball background decoration">
    </main>
</body>
</html>
