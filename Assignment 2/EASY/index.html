<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale X</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/images/favicon.avif" type="image/x-icon">
</head>

<body>
    <nav>
        <img id="logo" src="./assets/logo.svg" alt="Logo of ScaleX">
        <div class="links">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Blogs</a>
            <a href="#">Contact Us</a>
        </div>
        <button>Get Started</button>
    </nav>
    <main>
        <h1 id="topHeading">Insights & Blogs</h1>

        <div class="mid-nav">
            <button>All</button>
            <button>Tech</button>
            <button>SaaS</button>
            <button>Marketing</button>
        </div>

        <div class="article-container">
            <div class="article">
                <div class="article-img-wrapper">
                    <img class="article-img" src="./assets//images/glass.jpg" alt="Article Image">
                </div>
                <div class="article-text">
                    <p class="article-category">Tech</p>
                    <h2 class="article-heading">The Ultimate Guide to<br>SaaS Marketing</h2>
                    <p class="article-publish-date">May 23, 2025</p>
                </div>
            </div>

            <div class="article">
                <div class="article-img-wrapper">
                    <img class="article-img" src="./assets//images/chair.png" alt="Article Image">
                </div>

                <div class="article-text">
                    <p class="article-category">SaaS</p>
                    <h2 class="article-heading">5 Key Trends in SaaS<br>Growth For 2025</h2>
                    <p class="article-publish-date">May 23, 2025</p>
                </div>
            </div>

            <div class="article">
                <div class="article-img-wrapper">
                    <img class="article-img" src="./assets//images/cat.png" alt="Article Image">
                </div>

                <div class="article-text">
                    <p class="article-category">Marketing</p>
                    <h2 class="article-heading">How Data-driven<br>strategies are important</h2>
                    <p class="article-publish-date">May 23, 2025</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
